<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><title>Karta Klienta</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f0faf6;padding:1rem}h1{color:#1a5c40;font-size:20px;margin-bottom:1rem}.row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}.swrap{flex:1;min-width:180px;position:relative}.swrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#2e9e72;pointer-events:none}.sinput{width:100%;padding:12px 12px 12px 38px;font-size:16px;border:2px solid #a8e6cf;border-radius:12px;background:#fff;color:#1a5c40;outline:none}.btn{padding:12px 18px;font-size:15px;font-weight:700;border:none;border-radius:12px;background:#2e9e72;color:#fff;cursor:pointer}.card{background:#fff;border:2px solid #c8f0e0;border-radius:16px;padding:1rem;margin-bottom:.75rem}.stit{font-size:11px;font-weight:700;color:#2e9e72;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}@media(max-width:500px){.g2,.g3{grid-template-columns:1fr}}.lb{font-size:12px;font-weight:700;color:#2e9e72;display:block;margin-bottom:4px}.fi{width:100%;padding:10px;font-size:16px;border:2px solid #d4f2e5;border-radius:8px;background:#f8fffe;color:#1a5c40;outline:none;font-family:inherit}.fi:focus{border-color:#2e9e72}.rg{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}.ro{padding:8px 12px;font-size:14px;border:2px solid #c8f0e0;border-radius:8px;background:#f8fffe;color:#1a5c40;cursor:pointer;font-weight:500}.ro.on{border-color:#2e9e72;background:#d4f2e5;font-weight:700}.bsave{width:100%;padding:13px;font-size:16px;font-weight:700;border:none;border-radius:12px;background:#2e9e72;color:#fff;cursor:pointer;margin-top:8px}.fp{display:none;margin-bottom:1rem}.fp.open{display:block}.dbc{background:#fff;border:2px solid #c8f0e0;border-radius:16px;overflow:hidden}.dbh{padding:.8rem 1rem;background:#edfaf4;border-bottom:2px solid #c8f0e0;font-size:13px;font-weight:700;color:#2e9e72;display:flex;justify-content:space-between}.cnt{background:#2e9e72;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}.ts{overflow-x:auto;-webkit-overflow-scrolling:touch}table{width:100%;border-collapse:collapse;font-size:14px;min-width:500px}th{text-align:left;font-size:11px;font-weight:700;color:#2e9e72;padding:8px 12px;background:#f8fffe;border-bottom:2px solid #c8f0e0}td{padding:10px 12px;border-bottom:1px solid #e8f8f0;color:#1a5c40}.bk{display:inline-block;font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700}.ok{background:#d4f2e5;color:#1a5c40}.wn{background:#fff3cd;color:#7a5c00}.bd{background:#fde8e8;color:#8b1a1a}.em{text-align:center;padding:2rem;color:#8ecfb3}.av{width:32px;height:32px;border-radius:50%;background:#d4f2e5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1a5c40;flex-shrink:0}.dc{display:flex;align-items:center;gap:8px}.dn{font-weight:700;color:#1a5c40}.xb{background:none;border:none;color:#c8f0e0;font-size:16px;cursor:pointer;padding:4px 8px}</style></head><body><h1>🐾 Karta Klienta</h1><div class="row"><div class="swrap"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="2"/><path d="M11 11L14 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input class="sinput" id="sq" type="search" placeholder="Szukaj po imieniu, rasie, telefonie..." oninput="render(this.value)"></div><button class="btn" id="tb" onclick="tog()">+ Dodaj kartę</button></div><div class="fp" id="fp"><div class="card"><div class="stit">🐕 Dane pupila</div><div class="g2"><div><span class="lb">Imię psa *</span><input class="fi" id="fi" placeholder="np. Burek"></div><div><span class="lb">Rasa</span><input class="fi" id="fr" placeholder="np. Labrador"></div></div><div class="g2"><div><span class="lb">Wiek (lata)</span><input class="fi" id="fw" type="number" placeholder="np. 3"></div><div><span class="lb">Telefon</span><input class="fi" id="ft" type="tel" placeholder="np. 600 100 200"></div></div></div><div class="card"><div class="stit">✂️ Ostatnia wizyta</div><div class="g3"><div><span class="lb">Data</span><input class="fi" id="fd" type="date"></div><div><span class="lb">Co robiliśmy</span><input class="fi" id="fz" placeholder="np. strzyżenie"></div><div><span class="lb">Cena (zł)</span><input class="fi" id="fc" type="number" placeholder="np. 120"></div></div><div><span class="lb">Stan włosa</span><div class="rg"><div class="ro" onclick="sel(this)">Zdrowy</div><div class="ro" onclick="sel(this)">Silne sfilcowanie</div><div class="ro" onclick="sel(this)">Liczne kołtuny</div><div class="ro" onclick="sel(this)">Stan zaniedbany</div></div></div></div><div class="card"><div class="stit">⚠️ Ważne notatki</div><div class="g2"><div><span class="lb">Zachowanie</span><textarea class="fi" id="fz2" rows="3" placeholder="np. spokojna..."></textarea></div><div><span class="lb">Czego nie lubi</span><textarea class="fi" id="fn" rows="3" placeholder="np. suszarki..."></textarea></div></div></div><button class="bsave" onclick="zapisz()">💾 Zapisz kartę</button></div><div class="dbc"><div class="dbh"><span>Baza klientów</span><span class="cnt" id="cnt">0</span></div><div class="ts"><table><thead><tr><th>Pies</th><th>Rasa</th><th>Wiek</th><th>Telefon</th><th>Data</th><th>Zabieg</th><th>Cena</th><th>Stan włosa</th><th></th></tr></thead><tbody id="tb2"></tbody></table></div></div><script>const K='kv1';const sb={"Zdrowy":"ok","Silne sfilcowanie":"wn","Liczne kołtuny":"wn","Stan zaniedbany":"bd"};let cl=[];let st='';try{const d=localStorage.getItem(K);if(d)cl=JSON.parse(d);}catch(e){}function sv(){try{localStorage.setItem(K,JSON.stringify(cl));}catch(e){}}function ini(n){return n.trim().slice(0,2).toUpperCase();}function render(q){q=(q||'').toLowerCase().trim();const l=q?cl.filter(c=>c.i.toLowerCase().includes(q)||(c.r||'').toLowerCase().includes(q)||(c.t||'').includes(q)):cl;document.getElementById('cnt').textContent=cl.length;const tb=document.getElementById('tb2');if(!l.length){tb.innerHTML='<tr><td colspan="9" class="em">'+(q?'Brak wyników':'Brak klientów — dodaj pierwszą kartę!')+'</td></tr>';return;}tb.innerHTML=l.map(c=>'<tr><td><div class="dc"><div class="av">'+ini(c.i)+'</div><span class="dn">'+c.i+'</span></div></td><td>'+(c.r||'—')+'</td><td>'+(c.w?c.w+' l.':'—')+'</td><td style="font-weight:700;color:#2e9e72">'+(c.t||'—')+'</td><td>'+(c.d||'—')+'</td><td>'+(c.z||'—')+'</td><td style="font-weight:700">'+(c.c?c.c+' zł':'—')+'</td><td>'+(c.s?'<span class="bk '+(sb[c.s]||'')+'">'+c.s+'</span>':'—')+'</td><td><button class="xb" onclick="del('+cl.indexOf(c)+')">✕</button></td></tr>').join('');}function sel(el){document.querySelectorAll('.ro').forEach(x=>x.classList.remove('on'));el.classList.add('on');st=el.textContent;}function tog(){const f=document.getElementById('fp');f.classList.toggle('open');document.getElementById('tb').textContent=f.classList.contains('open')?'✕ Anuluj':'+ Dodaj kartę';}function zapisz(){const i=document.getElementById('fi').value.trim();if(!i){document.getElementById('fi').focus();return;}cl.unshift({i,r:document.getElementById('fr').value.trim(),w:document.getElementById('fw').value.trim(),t:document.getElementById('ft').value.trim(),d:document.getElementById('fd').value,z:document.getElementById('fz').value.trim(),c:document.getElementById('fc').value.trim(),s:st,z2:document.getElementById('fz2').value.trim(),n:document.getElementById('fn').value.trim()});sv();['fi','fr','fw','ft','fd','fz','fc','fz2','fn'].forEach(id=>document.getElementById(id).value='');document.querySelectorAll('.ro').forEach(x=>x.classList.remove('on'));st='';render(document.getElementById('sq').value);document.getElementById('fp').classList.remove('open');document.getElementById('tb').textContent='+ Dodaj kartę';}function del(i){if(confirm('Usunąć: '+cl[i].i+'?')){cl.splice(i,1);sv();render(document.getElementById('sq').value);}}render();</script></body></html>
